name: fai_ai
description: Assistente pessoal de IA para Android com ativação por voz e automações inteligentes.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2
  http: ^1.2.2
  battery_plus: ^6.0.2
  geolocator: ^12.0.0
  device_apps: ^2.2.0
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  flutter_inappwebview: ^6.1.5
  android_intent_plus: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_background_service: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
